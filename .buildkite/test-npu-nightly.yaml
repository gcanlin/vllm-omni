steps:
  - group: ":card_index_dividers: Diffusion X2V Model Test"
    key: nightly-diffusion-x2v-group
    depends_on: upload-nightly-pipeline
    if:
      build.pull_request.labels includes "npu-test"
    steps:
      - label: ":full_moon: Diffusion X2V · Function Test"
        agents:
          queue: "ascend-a2b3"
          resource_class: "npu-2"
        image: "swr.cn-southwest-2.myhuaweicloud.com/modelfoundry/vllm-omni-ci-npu:${BUILDKITE_COMMIT}"
        plugins:
          - kubernetes:
              podSpecPatch:
                imagePullSecrets:
                  - name: swr-secret
                containers:
                  - name: container-0
                    env:
                      - name: HF_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: hf-token-secret
                            key: token
        env:
          VLLM_WORKER_MULTIPROC_METHOD: spawn
          HF_HUB_OFFLINE: 1
        commands:
          - pytest -s -v tests/e2e/online_serving/test_wan22_expansion.py -k npu_i2v --run-level "full_model"
