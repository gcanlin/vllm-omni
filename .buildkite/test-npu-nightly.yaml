steps:
  - group: ":card_index_dividers: Diffusion X2V Model Test"
    key: nightly-diffusion-x2v-group
    depends_on: upload-nightly-pipeline
    if:
      build.pull_request.labels includes "npu-test"
    steps:
      - label: ":full_moon: Diffusion X2V · Function Test"
        commands:
          - pytest -s -v tests/e2e/online_serving/test_wan22_expansion.py --run-level "full_model"
        agents:
          queue: "ascend-a2b3"
          resource_class: "npu-4"